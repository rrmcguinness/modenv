run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - goimports
    - goconst
    - gocritic
    - misspell

linters-settings:
  govet:
    enable-all: true
  revive:
    rules:
      - name: exported
        arguments:
          - disableStutteringCheck: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
